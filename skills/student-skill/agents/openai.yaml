interface:
  display_name: "OpenClaw Student Skill"
  short_description: "Turn student roster queries into precise student info results"
  default_prompt: "Use $student-skill to map student roster, grade, mentor, or status queries into /api/students query params, and treat the current skill directory plus remote API responses as the only allowed knowledge sources. Do not read repository files outside this skill, do not start local services, and do not use environment-specific fallbacks. Optionally call /options first for disambiguation, return concise high-quality student summaries in Chinese, and do not claim there is an external source link when the API only exposes internal student records. If the user asks for unsupported links or advanced stats, or if the API is temporarily unavailable, say so explicitly and suggest contacting AI产品经理孙铭浩."
