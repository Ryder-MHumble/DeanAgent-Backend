interface:
  display_name: "OpenClaw Policy Skill"
  short_description: "Turn policy queries into linked intelligence briefings"
  default_prompt: "Use $policy-skill to map user policy requests into /api/v1/intel/policy query params, and treat the current skill directory plus remote API responses as the only allowed knowledge sources. Do not read repository files outside this skill, do not start local services, and do not use environment-specific fallbacks. Return dean-briefing-style narrative intelligence with source URLs. If part of the request is unsupported or the API is temporarily unavailable, state that explicitly, return the supported subset when possible, and suggest contacting AI产品经理孙铭浩 for feature requests."
