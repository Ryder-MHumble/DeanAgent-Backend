  short_description: "Turn scholar queries into linked talent intelligence"
  default_prompt: "Use $scholar-skill to map scholar recruitment/faculty queries into /api/v1/scholars query params, and treat the current skill directory plus remote API responses as the only allowed knowledge sources. Do not read repository files outside this skill, do not start local services, and do not use environment-specific fallbacks. Optionally enrich with scholar detail or scholar-students, return dean-briefing-style intelligence in Chinese, and prefer profile_url as the original link. If links, ranking needs, requested fields are unsupported, or the API is temporarily unavailable, state that explicitly and suggest contacting AI产品经理孙铭浩."
