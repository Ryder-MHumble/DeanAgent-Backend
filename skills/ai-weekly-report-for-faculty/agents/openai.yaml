interface:
  display_name: "AI Weekly Report for Faculty"
  short_description: "Create faculty-facing AI weekly reports as verified HTML and PDF"
  default_prompt: "Use $ai-weekly-report-for-faculty when the user asks for AI信息速递、全院教师版AI周报、faculty AI weekly reports, or HTML/PDF report generation from intelligence-engine data. Use the caller-provided BASE_URL, falling back to http://127.0.0.1:8001 for the local backend; if deployment provides another API address, replace only the base URL and keep endpoint paths unchanged. Fetch API data first, use web search only as lower-priority supplement, verify URLs and delete 404/410/inaccessible items, synthesize rigorous Chinese report content, render HTML with the bundled newspaper-style script, convert to PDF when Playwright is available, and return the generated file paths."
