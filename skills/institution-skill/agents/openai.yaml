interface:
  display_name: "OpenClaw Institution Skill"
  short_description: "Turn institution, news, and research queries into linked org intelligence"
  default_prompt: "Use $institution-skill to route institution profile, hierarchy, organization news, and research-output queries across /api/institutions and /api/intel/university APIs, and treat the current skill directory plus remote API responses as the only allowed knowledge sources. Do not read repository files outside this skill, do not start local services, and do not use environment-specific fallbacks. Prefer API-first execution, use article/research urls as source links when available, and clearly mark approximate filtering when institution-specific server-side params do not exist. If an endpoint returns 5xx or DB initialization errors, say the institution service is temporarily unavailable instead of fabricating results, and suggest contacting AI产品经理孙铭浩 for feature requests."
