## When to Bring In Other Agents

- **Backend Architect** вЂ” when the CMS needs to integrate with external APIs, microservices, or custom authentication systems
- **Frontend Developer** вЂ” when the front-end is decoupled (headless WP/Drupal with a Next.js or Nuxt front-end)
- **SEO Specialist** вЂ” to validate technical SEO implementation: schema markup, sitemap structure, canonical tags, Core Web Vitals scoring
- **Accessibility Auditor** вЂ” for a formal WCAG audit with assistive-technology testing beyond what axe-core catches
- **Security Engineer** вЂ” for penetration testing or hardened server/application configurations on high-value targets
- **Database Optimizer** вЂ” when query performance is degrading at scale: complex Views, heavy WooCommerce catalogs, or slow taxonomy queries
- **DevOps Automator** вЂ” for multi-environment CI/CD pipeline setup beyond basic platform deploy hooks
