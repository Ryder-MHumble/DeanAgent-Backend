dimension: "paper"
dimension_name: "论文主数据"
description: "顶会论文主表信源，面向平台级论文仓。默认抓取近三年口径，不限 topic，但部分 venue 保留 track 口径。"

default_keyword_filter: []
default_keyword_blacklist: []

paper_defaults: &paper_defaults
  crawl_method: "static"
  schedule: "daily"
  priority: 1
  is_enabled: false
  persist_to_db: true
  entity_family: "paper_record"
  request_timeout: 30
  max_retries: 2
  request_delay: 0.2
  group: "paper_warehouse"

sources:
  - <<: *paper_defaults
    id: "acl_long"
    name: "ACL Long Papers"
    source_type: "raw_official"
    crawler_class: "aclanthology"
    venue: "ACL"
    venue_full: "Annual Meeting of the Association for Computational Linguistics"
    track: "acl-long"
    track_label: "Long Paper"
    is_main_track: true
    is_workshop: false
    year_configs:
      - year: 2024
      - year: 2025
    tags: ["paper", "warehouse", "acl", "nlp"]

  - <<: *paper_defaults
    id: "acl_short"
    name: "ACL Short Papers"
    source_type: "raw_official"
    crawler_class: "aclanthology"
    venue: "ACL"
    venue_full: "Annual Meeting of the Association for Computational Linguistics"
    track: "acl-short"
    track_label: "Short Paper"
    is_main_track: true
    is_workshop: false
    year_configs:
      - year: 2024
      - year: 2025
    tags: ["paper", "warehouse", "acl", "nlp"]

  - <<: *paper_defaults
    id: "iclr"
    name: "ICLR Papers"
    source_type: "official_api"
    crawler_class: "openreview"
    venue: "ICLR"
    venue_full: "International Conference on Learning Representations"
    track_label: "Main Conference"
    is_main_track: true
    is_workshop: false
    page_size: 1000
    year_configs:
      - year: 2024
        venue_id: "ICLR.cc/2024/Conference"
      - year: 2025
        venue_id: "ICLR.cc/2025/Conference"
    tags: ["paper", "warehouse", "iclr", "openreview"]

  - <<: *paper_defaults
    id: "neurips"
    name: "NeurIPS Papers"
    source_type: "raw_official"
    crawler_class: "nips_papers_cc"
    venue: "NeurIPS"
    venue_full: "Advances in Neural Information Processing Systems"
    track_label: "Main Conference"
    is_main_track: true
    is_workshop: false
    year_configs:
      - year: 2022
      - year: 2023
      - year: 2024
    tags: ["paper", "warehouse", "neurips"]

  - <<: *paper_defaults
    id: "cvpr"
    name: "CVPR Papers"
    source_type: "raw_official"
    crawler_class: "cvf_openaccess"
    venue: "CVPR"
    venue_full: "IEEE/CVF Conference on Computer Vision and Pattern Recognition"
    track_label: "Main Conference"
    is_main_track: true
    is_workshop: false
    year_configs:
      - year: 2023
      - year: 2024
      - year: 2025
    tags: ["paper", "warehouse", "cvpr", "cvf"]

  - <<: *paper_defaults
    id: "eccv"
    name: "ECCV Papers"
    source_type: "raw_official"
    crawler_class: "ecva_papers"
    venue: "ECCV"
    venue_full: "European Conference on Computer Vision"
    track_label: "Main Conference"
    is_main_track: true
    is_workshop: false
    url: "https://www.ecva.net/papers.php"
    year_configs:
      - year: 2022
      - year: 2024
    tags: ["paper", "warehouse", "eccv", "ecva"]

  - <<: *paper_defaults
    id: "ijcai"
    name: "IJCAI Papers"
    source_type: "raw_official"
    crawler_class: "ijcai_proceedings"
    venue: "IJCAI"
    venue_full: "International Joint Conference on Artificial Intelligence"
    track_label: "Main Track"
    track_filter: ["Main Track"]
    is_main_track: true
    is_workshop: false
    year_configs:
      - year: 2023
      - year: 2024
      - year: 2025
    tags: ["paper", "warehouse", "ijcai"]

  - <<: *paper_defaults
    id: "aaai"
    name: "AAAI Papers"
    source_type: "raw_official"
    crawler_class: "ojs_aaai"
    venue: "AAAI"
    venue_full: "AAAI Conference on Artificial Intelligence"
    is_main_track: true
    is_workshop: false
    detail_concurrency: 2
    year_configs:
      - year: 2024
        issue_ids: [576, 577, 578, 579, 580, 581, 582, 583, 584, 585, 586, 587, 588, 589, 590, 591, 592, 593, 594, 595, 596]
        fetch_affiliations: true
