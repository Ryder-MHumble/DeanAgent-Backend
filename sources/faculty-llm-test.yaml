dimension: university_faculty
dimension_name: 高校师资（LLM 测试）
sources:
# ============================================================================
# LLM Faculty Crawler 测试配置（成本优化版）
# ============================================================================
#
# 核心优势：
# 1. 无需手写 CSS 选择器
# 2. 自动适配不同网站结构
# 3. 使用便宜的国产模型（Deepseek V3）
# 4. HTML 清洗 + token 限制，严格控制成本
#
# 成本对比（每个学者）：
# - Claude 3.5 Sonnet: ~$0.10-0.15
# - Deepseek V3: ~$0.01-0.02（便宜 10 倍）
# - Qwen 2.5 72B: ~$0.015-0.025
#
# 配置说明：
# - crawler_class: llm_faculty（必填）
# - llm_provider: openrouter（推荐，支持多种模型）
# - llm_model: deepseek/deepseek-chat（推荐，性价比最高）
# - max_list_tokens: 列表页最大输出 token（默认 4000）
# - max_detail_tokens: 详情页最大输出 token（默认 8000）
# - request_delay: 请求延迟（秒），建议 1-2 秒
# ============================================================================

- id: test_tsinghua_air_llm
  name: 清华大学智能产业研究院-研究团队（LLM测试）
  group: tsinghua
  university: 清华大学
  department: 智能产业研究院
  url: https://air.tsinghua.edu.cn/airtd/yjtd.htm
  crawler_class: llm_faculty
  llm_provider: openrouter
  llm_model: deepseek/deepseek-chat
  max_list_tokens: 4000
  max_detail_tokens: 8000
  schedule: weekly
  priority: 2
  is_enabled: true  # 启用测试
  request_delay: 1.5
  tags:
  - faculty
  - tsinghua
  - ai
  - llm_test

